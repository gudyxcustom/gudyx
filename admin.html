<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gudyx Custom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --roxo-profundo: #0b041c; --ciano-brilhante: #00f2fe; --vidro-fundo: rgba(11,4,28,0.65); --vidro-borda: rgba(172,40,255,0.3); }
        body { font-family: 'Poppins', sans-serif; background: #0b041c; color: #f0eaff; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; }
        .admin-container { background: var(--vidro-fundo); backdrop-filter: blur(12px); border: 1px solid var(--vidro-borda); border-radius: 24px; padding: 30px; max-width: 900px; width: 100%; }
        h1 { text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        label { display: block; margin: 10px 0 5px; font-size: 0.9rem; opacity: 0.8; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--vidro-borda); background: rgba(255,255,255,0.05); color: #fff; font-size: 0.95rem; margin-bottom: 10px; font-family: inherit; }
        textarea { resize: vertical; min-height: 60px; }
        input[type="file"], input[type="checkbox"] { padding: 5px; width: auto; }
        button { padding: 10px 20px; border: none; border-radius: 30px; background: linear-gradient(135deg, #a028ff, #00f2fe); color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; margin-right: 10px; margin-bottom: 5px; }
        button:hover { transform: scale(1.05); }
        .btn-danger { background: #ff4455; }
        .btn-danger:hover { background: #cc1122; }
        .btn-secondary { background: #666; }
        .btn-whatsapp-modal { background: #25D366 !important; }
        .admin-item-list { margin: 20px 0; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; max-height: 300px; overflow-y: auto; }
        .admin-item-list .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 5px; }
        .admin-item-list .item button { padding: 4px 12px; font-size: 0.8rem; background: #ff4455; margin: 2px; }
        .admin-item-list .item .btn-edit { background: #a028ff; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tabs button { flex: 1; background: rgba(255,255,255,0.1); min-width: 80px; }
        .tabs button.active { background: linear-gradient(135deg, #a028ff, #00f2fe); }
        .hidden { display: none !important; }
        #passwordOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:9999; flex-direction:column; }
        #passwordOverlay.hidden { display:none; }
        #passwordOverlay input { max-width:300px; margin:10px auto; }
        .linha-desconto { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
        .linha-desconto input { width: 100px; margin-bottom: 0; }
        .linha-desconto button { background: #ff4455; padding: 5px 10px; margin: 0; }
        .pedido-card { border:1px solid var(--vidro-borda); padding:15px; margin-bottom:15px; border-radius:12px; background:rgba(255,255,255,0.03); }
        .pedido-card .status { display:inline-block; padding:4px 12px; border-radius:20px; font-weight:bold; font-size:0.8rem; }
        .status-aguardando { background:#b8860b; color:#fff; }
        .status-pronto { background:#008000; color:#fff; }
        .status-retirado { background:#00f2fe; color:#000; }
        .pedido-card .acoes { margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
    </style>
</head>
<body>
    <div id="passwordOverlay">
        <h2 style="color:#fff;">🔒 Acesso Restrito</h2>
        <input type="password" id="adminPassInput" placeholder="Senha">
        <button onclick="checkPassword()">Entrar</button>
        <p id="passError" style="color:#ff4455;font-size:0.8rem;margin-top:10px;display:none;">Senha incorreta!</p>
    </div>

    <div id="adminContent" class="admin-container" style="display:none;">
        <h1>⚙️ Painel Admin Gudyx</h1>
        <div class="tabs">
            <button onclick="abrirAba('categorias')" id="tabCategorias" class="active">Categorias</button>
            <button onclick="abrirAba('produtos')" id="tabProdutos">Itens</button>
            <button onclick="abrirAba('pedidos')" id="tabPedidos">Pedidos</button>
            <button onclick="abrirAba('frases')" id="tabFrases">Frases</button>
            <button onclick="abrirAba('faq')" id="tabFaq">FAQ</button>
            <button onclick="abrirAba('configLoja')" id="tabConfigLoja">Config. Loja</button>
            <button onclick="abrirAba('relatorios')" id="tabRelatorios">Relatórios</button>
            <button onclick="abrirAba('backup')" id="tabBackup">Backup</button>
        </div>

        <!-- CATEGORIAS -->
        <div id="abaCategorias">
            <h3>Adicionar / Editar Categoria</h3>
            <input type="hidden" id="editCatId">
            <label>Tipo</label><select id="catTipo"><option value="produtos">Produtos</option><option value="servicos">Serviços</option></select>
            <label>Nome</label><input type="text" id="catNome">
            <label>Imagem</label><input type="file" id="catImg" accept="image/*">
            <button onclick="salvarCategoria()">Salvar Categoria</button>
            <div class="admin-item-list" id="listaCategorias"></div>
        </div>

        <!-- PRODUTOS -->
        <div id="abaProdutos" style="display:none;">
            <h3>Adicionar / Editar Item</h3>
            <input type="hidden" id="editProdId">
            <label>Tipo</label><select id="prodTipo" onchange="atualizarSelectCategorias()"><option value="produtos">Produtos</option><option value="servicos">Serviços</option></select>
            <label>Categoria</label><select id="prodCategoria"></select>
            <label>Nome</label><input type="text" id="prodNome">
            <label>Descrição</label><textarea id="prodDescricao"></textarea>
            <label>Preço (R$)</label><input type="text" id="prodPreco">
            <label>Estoque</label><input type="number" id="prodEstoque" min="0">
            <label>Imagens (máx 3)</label><input type="file" id="prodImg" accept="image/*" multiple>
            <div class="checkbox-group">
                <label><input type="checkbox" id="prodPromocao" onchange="togglePromoFields()"> Promoção</label>
                <label><input type="checkbox" id="prodDestaque"> Destaque</label>
                <label><input type="checkbox" id="prodSlider"> Slider</label>
            </div>
            <div id="promoFields" class="hidden">
                <label>Desconto (%)</label><input type="number" id="prodDesconto" min="0" max="100">
                <label>Início</label><input type="datetime-local" id="prodPromoStart">
                <label>Fim</label><input type="datetime-local" id="prodPromoEnd">
                <label>Descrição da Promo</label><textarea id="prodDescPromo"></textarea>
            </div>
            
            <div style="border-top:1px solid var(--vidro-borda); margin-top:15px; padding-top:15px;">
                <label>📊 Preço Progressivo (Desconto por quantidade)</label>
                <div id="containerDescontoProgressivo">
                    <div class="linha-desconto">
                        <input type="number" class="input-qtd" placeholder="Qtd mínima" min="1">
                        <input type="number" class="input-desc" placeholder="% de desconto" min="0" max="100">
                        <button class="btn-danger" onclick="removerLinhaDesconto(this)">-</button>
                    </div>
                </div>
                <button onclick="adicionarLinhaDesconto()" class="btn-secondary" style="margin-top:5px;">+ Adicionar faixa de desconto</button>
            </div>

            <button onclick="salvarProduto()" style="margin-top:15px;">Salvar Item</button>
            <div class="admin-item-list" id="listaProdutos"></div>
        </div>

        <!-- PEDIDOS -->
        <div id="abaPedidos" style="display:none;">
            <h3>📦 Gerenciar Pedidos</h3>
            <div id="listaPedidosAdmin" class="admin-item-list" style="max-height: none; padding: 10px;"></div>
        </div>

        <!-- FRASES -->
        <div id="abaFrases" style="display:none;">
            <h3>Frases do Gluudyx</h3>
            <textarea id="frasesInput" rows="6"></textarea>
            <button onclick="salvarFrases()">Salvar Frases</button>
        </div>

        <!-- FAQ -->
        <div id="abaFaq" style="display:none;">
            <h3>Gerenciar FAQ</h3>
            <input type="hidden" id="editFaqId">
            <label>Pergunta</label><input type="text" id="faqPergunta">
            <label>Resposta</label><textarea id="faqResposta"></textarea>
            <button onclick="salvarFaq()">Salvar FAQ</button>
            <div class="admin-item-list" id="listaFaq"></div>
        </div>

        <!-- CONFIGURAÇÃO DA LOJA -->
        <div id="abaConfigLoja" style="display:none;">
            <h3>⚙️ Configuração de Prazos e Retirada</h3>
            <div style="background:rgba(255,255,255,0.05); border-radius:12px; padding:15px; margin-bottom:15px;">
                <label>Prazo Mínimo para ficar pronto (em dias)</label>
                <input type="number" id="configPrazoMin" min="1" value="3">
                <label>Prazo Máximo para ficar pronto (em dias)</label>
                <input type="number" id="configPrazoMax" min="2" value="5">
                <label style="display:flex; align-items:center; gap:10px; margin-top:15px;">
                    <input type="checkbox" id="configPedidosEmAndamento" style="width:auto; transform:scale(1.5); margin-right:10px;">
                    Há pedidos em andamento?
                </label>
                <button onclick="salvarConfigLoja()" style="margin-top:15px;">Salvar Configurações</button>
            </div>
        </div>

        <!-- RELATÓRIOS -->
        <div id="abaRelatorios" style="display:none;">
            <h3>📊 Relatórios de Cliques</h3>
            <div id="relatorioContainer"></div>
        </div>

        <!-- BACKUP -->
        <div id="abaBackup" style="display:none;">
            <h3>Backup e Restauração</h3>
            <button onclick="exportarBackup()">⬇️ Baixar Backup</button>
            <br><br>
            <label>Restaurar backup:</label>
            <input type="file" id="importFile" accept=".json">
            <button onclick="importarBackup()" class="btn-danger">⬆️ Restaurar</button>
        </div>

        <button class="btn-danger" onclick="limparDados()" style="margin-top:20px;">Limpar todos os dados</button>
        <a href="index.html" style="display:block;text-align:center;margin-top:20px;color:#00f2fe;">← Voltar para o site</a>
    </div>

    <script>
        const WA_NUMBER = '5521976121076'; // Definido para o aviso no Admin
        const firebaseConfig = {
            apiKey: "AIzaSyBLZysnzumgrJPHgFq918WGxH5cGBkv7PY",
            authDomain: "gudyx-ff54b.firebaseapp.com",
            projectId: "gudyx-ff54b",
            storageBucket: "gudyx-ff54b.firebasestorage.app",
            messagingSenderId: "569303537578",
            appId: "1:569303537578:web:cc5e52933cc30a9c513dd3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        firebase.auth().signInAnonymously().catch(e => console.error("Auth error:", e));

        var dados = { categorias: [], produtos: [], frases: [], faq: [] };
        var configLoja = { prazoMinimo: 3, prazoMaximo: 5, pedidosEmAndamento: false };

        async function carregarDados() {
            try {
                const snapCat = await db.collection('categorias').get();
                dados.categorias = snapCat.docs.map(d => ({ id: d.id, tipo: d.data().tipo, nome: d.data().nome, imagem: d.data().imagem || '' }));
                const snapProd = await db.collection('produtos').get();
                dados.produtos = snapProd.docs.map(d => ({ id: d.id, ...d.data() }));
                const snapFrases = await db.collection('config').doc('frases').get();
                dados.frases = snapFrases.exists ? snapFrases.data().lista : [];
                const snapFaq = await db.collection('config').doc('faq').get();
                dados.faq = snapFaq.exists ? snapFaq.data().perguntas : [];
                
                const snapConfigLoja = await db.collection('config').doc('loja').get();
                if (snapConfigLoja.exists) {
                    configLoja = snapConfigLoja.data();
                    document.getElementById('configPrazoMin').value = configLoja.prazoMinimo;
                    document.getElementById('configPrazoMax').value = configLoja.prazoMaximo;
                    document.getElementById('configPedidosEmAndamento').checked = configLoja.pedidosEmAndamento;
                }
            } catch(e) { console.error(e); }
        }

        function abrirAba(aba) {
            ['abaCategorias','abaProdutos','abaPedidos','abaFrases','abaFaq','abaConfigLoja','abaRelatorios','abaBackup'].forEach(id => document.getElementById(id).style.display = 'none');
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            if (aba === 'categorias') { document.getElementById('abaCategorias').style.display = 'block'; document.getElementById('tabCategorias').classList.add('active'); }
            else if (aba === 'produtos') { document.getElementById('abaProdutos').style.display = 'block'; document.getElementById('tabProdutos').classList.add('active'); atualizarSelectCategorias(); }
            else if (aba === 'pedidos') { document.getElementById('abaPedidos').style.display = 'block'; document.getElementById('tabPedidos').classList.add('active'); carregarPedidos(); }
            else if (aba === 'frases') { document.getElementById('abaFrases').style.display = 'block'; document.getElementById('tabFrases').classList.add('active'); document.getElementById('frasesInput').value = dados.frases.join('\n'); }
            else if (aba === 'faq') { document.getElementById('abaFaq').style.display = 'block'; document.getElementById('tabFaq').classList.add('active'); carregarFAQ(); }
            else if (aba === 'configLoja') { document.getElementById('abaConfigLoja').style.display = 'block'; document.getElementById('tabConfigLoja').classList.add('active'); carregarConfigLoja(); }
            else if (aba === 'relatorios') { document.getElementById('abaRelatorios').style.display = 'block'; document.getElementById('tabRelatorios').classList.add('active'); carregarRelatorios(); }
            else if (aba === 'backup') { document.getElementById('abaBackup').style.display = 'block'; document.getElementById('tabBackup').classList.add('active'); }
        }

        function redimensionarImagem(file, maxWidth, qualidade) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ratio = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * ratio;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', qualidade));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function salvarCategoria() {
            const id = document.getElementById('editCatId').value;
            const tipo = document.getElementById('catTipo').value;
            const nome = document.getElementById('catNome').value.trim();
            if (!nome) return alert('Digite o nome.');
            const fileInput = document.getElementById('catImg');
            async function processarCat(imagem) {
                const dadosCat = { tipo, nome, imagem: imagem || '' };
                if (id) { await db.collection('categorias').doc(id).update(dadosCat); }
                else { const docRef = await db.collection('categorias').add(dadosCat); await db.collection('categorias').doc(docRef.id).update({ id: docRef.id }); }
                document.getElementById('editCatId').value = ''; document.getElementById('catNome').value = ''; document.getElementById('catImg').value = '';
                await carregarDados(); atualizarListaCategorias(); atualizarSelectCategorias();
            }
            if (fileInput.files[0]) { processarCat(await redimensionarImagem(fileInput.files[0], 400, 0.4)); }
            else { processarCat(null); }
        }

        function editarCategoria(id) {
            const cat = dados.categorias.find(c => c.id === id);
            if (!cat) return;
            document.getElementById('editCatId').value = cat.id;
            document.getElementById('catTipo').value = cat.tipo;
            document.getElementById('catNome').value = cat.nome;
        }

        async function removerCategoria(id) {
            if (!confirm('Remover categoria e itens?')) return;
            await db.collection('categorias').doc(id).delete();
            for (const prod of dados.produtos.filter(p => p.categoriaId === id)) { await db.collection('produtos').doc(prod.id).delete(); }
            await carregarDados(); atualizarListaCategorias(); atualizarSelectCategorias();
        }

        function atualizarListaCategorias() {
            const lista = document.getElementById('listaCategorias'); lista.innerHTML = '';
            dados.categorias.forEach(cat => {
                lista.innerHTML += `<div class="item"><span>[${cat.tipo}] ${cat.nome}</span><div><button class="btn-edit" onclick="editarCategoria('${cat.id}')">✏️</button><button onclick="removerCategoria('${cat.id}')">Remover</button></div></div>`;
            });
        }

        function adicionarLinhaDesconto() {
            const container = document.getElementById('containerDescontoProgressivo');
            const div = document.createElement('div');
            div.className = 'linha-desconto';
            div.innerHTML = `
                <input type="number" class="input-qtd" placeholder="Qtd mínima" min="1">
                <input type="number" class="input-desc" placeholder="% de desconto" min="0" max="100">
                <button class="btn-danger" onclick="removerLinhaDesconto(this)">-</button>
            `;
            container.appendChild(div);
        }
        function removerLinhaDesconto(btn) { btn.parentElement.remove(); }

        async function salvarProduto() {
            const id = document.getElementById('editProdId').value;
            const catId = document.getElementById('prodCategoria').value;
            const nome = document.getElementById('prodNome').value.trim();
            const descricao = document.getElementById('prodDescricao').value.trim();
            const preco = document.getElementById('prodPreco').value.trim();
            const estoque = parseInt(document.getElementById('prodEstoque').value) || 0;
            const promocao = document.getElementById('prodPromocao').checked;
            const destaque = document.getElementById('prodDestaque').checked;
            const exibirSlider = document.getElementById('prodSlider').checked;
            const promoStart = document.getElementById('prodPromoStart').value;
            const promoEnd = document.getElementById('prodPromoEnd').value;
            const descPromo = document.getElementById('prodDescPromo').value.trim();
            let precoPromo = '', desconto = 0;
            if (promocao) {
                desconto = parseFloat(document.getElementById('prodDesconto').value) || 0;
                const num = parseFloat(preco.replace(',', '.'));
                if (!isNaN(num) && desconto > 0) precoPromo = (num * (1 - desconto / 100)).toFixed(2).replace('.', ',');
                else precoPromo = preco;
            }
            if (!catId || !nome || !preco) return alert('Preencha nome e preço.');

            const descontoProgressivo = [];
            document.querySelectorAll('.linha-desconto').forEach(row => {
                const qtd = parseInt(row.querySelector('.input-qtd').value);
                const desc = parseFloat(row.querySelector('.input-desc').value);
                if(qtd && desc && desc > 0) descontoProgressivo.push({ qtd, desconto: desc });
            });

            const fileInput = document.getElementById('prodImg');
            async function processarProd(imagens) {
                const produto = { 
                    categoriaId: catId, nome, descricao, preco, estoque, imagens: imagens || [], 
                    promocao, destaque, exibirSlider, precoPromo, desconto, promoStart, promoEnd, descPromo, 
                    cliques: id ? (dados.produtos.find(p => p.id === id)?.cliques || 0) : 0,
                    descontoProgressivo
                };
                if (id) { await db.collection('produtos').doc(id).update(produto); }
                else { const docRef = await db.collection('produtos').add(produto); await db.collection('produtos').doc(docRef.id).update({ id: docRef.id }); }
                limparFormularioProduto(); await carregarDados(); atualizarListaProdutos();
            }

            if (fileInput.files.length > 0) {
                const imagens = [];
                for (let f of Array.from(fileInput.files).slice(0, 3)) { imagens.push(await redimensionarImagem(f, 600, 0.5)); }
                processarProd(imagens);
            } else { processarProd(id ? (dados.produtos.find(p => p.id === id)?.imagens || []) : []); }
        }

        function editarProduto(id) {
            const p = dados.produtos.find(p => p.id === id);
            if (!p) return;
            document.getElementById('editProdId').value = p.id;
            document.getElementById('prodTipo').value = dados.categorias.find(c => c.id === p.categoriaId)?.tipo || 'produtos';
            atualizarSelectCategorias();
            document.getElementById('prodCategoria').value = p.categoriaId;
            document.getElementById('prodNome').value = p.nome;
            document.getElementById('prodDescricao').value = p.descricao || '';
            document.getElementById('prodPreco').value = p.preco;
            document.getElementById('prodEstoque').value = p.estoque || 0;
            document.getElementById('prodPromocao').checked = p.promocao || false;
            document.getElementById('prodDestaque').checked = p.destaque || false;
            document.getElementById('prodSlider').checked = p.exibirSlider || false;
            if (p.promocao) {
                document.getElementById('prodDesconto').value = p.desconto || 0;
                document.getElementById('prodDescPromo').value = p.descPromo || '';
                document.getElementById('prodPromoStart').value = p.promoStart || '';
                document.getElementById('prodPromoEnd').value = p.promoEnd || '';
                document.getElementById('promoFields').classList.remove('hidden');
            } else { document.getElementById('promoFields').classList.add('hidden'); }

            const container = document.getElementById('containerDescontoProgressivo');
            container.innerHTML = '';
            if (p.descontoProgressivo && p.descontoProgressivo.length > 0) {
                p.descontoProgressivo.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'linha-desconto';
                    div.innerHTML = `
                        <input type="number" class="input-qtd" value="${item.qtd}" placeholder="Qtd mínima" min="1">
                        <input type="number" class="input-desc" value="${item.desconto}" placeholder="% de desconto" min="0" max="100">
                        <button class="btn-danger" onclick="removerLinhaDesconto(this)">-</button>
                    `;
                    container.appendChild(div);
                });
            } else {
                adicionarLinhaDesconto();
            }
        }

        async function removerProduto(id) { if (confirm('Remover?')) { await db.collection('produtos').doc(id).delete(); await carregarDados(); atualizarListaProdutos(); } }
        function limparFormularioProduto() { 
            document.getElementById('editProdId').value = ''; document.getElementById('prodNome').value = ''; document.getElementById('prodDescricao').value = ''; 
            document.getElementById('prodPreco').value = ''; document.getElementById('prodEstoque').value = ''; document.getElementById('prodImg').value = ''; 
            document.getElementById('prodPromocao').checked = false; document.getElementById('prodDestaque').checked = false; document.getElementById('prodSlider').checked = false; 
            document.getElementById('promoFields').classList.add('hidden');
            document.getElementById('containerDescontoProgressivo').innerHTML = '';
            adicionarLinhaDesconto();
        }
        function atualizarSelectCategorias() {
            const tipo = document.getElementById('prodTipo').value;
            const select = document.getElementById('prodCategoria'); select.innerHTML = '<option value="">Selecione</option>';
            dados.categorias.filter(c => c.tipo === tipo).forEach(cat => { select.innerHTML += `<option value="${cat.id}">${cat.nome}</option>`; });
        }
        function atualizarListaProdutos() {
            const lista = document.getElementById('listaProdutos'); lista.innerHTML = '';
            dados.produtos.forEach(p => {
                const cat = dados.categorias.find(c => c.id === p.categoriaId);
                lista.innerHTML += `<div class="item"><span>${cat?.nome || '?'} → ${p.nome} (R$ ${p.preco})</span><div><button class="btn-edit" onclick="editarProduto('${p.id}')">✏️</button><button onclick="removerProduto('${p.id}')">Remover</button></div></div>`;
            });
        }

        function carregarPedidos() {
            const container = document.getElementById('listaPedidosAdmin');
            container.innerHTML = '<p style="text-align:center;">Carregando pedidos...</p>';
            
            db.collection('pedidos').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                if (snapshot.empty) {
                    container.innerHTML = '<p style="text-align:center; opacity:0.6;">Nenhum pedido registrado ainda.</p>';
                    return;
                }
                let html = '';
                snapshot.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    const itens = p.itens ? p.itens.map(i => `${i.nome} (x${i.quantidade})`).join(', ') : 'Itens não listados';
                    
                    let statusClass = 'status-aguardando';
                    let statusText = p.status || 'Aguardando confirmação';
                    if(p.status === 'Pronto para retirar') { statusClass = 'status-pronto'; }
                    else if(p.status === 'Retirado') { statusClass = 'status-retirado'; }

                    html += `
                        <div class="pedido-card">
                            <div><strong>Status:</strong> <span class="status ${statusClass}">${statusText}</span></div>
                            <div><strong>Itens:</strong> ${itens}</div>
                            <div><strong>Total:</strong> R$ ${p.total || '0,00'}</div>
                            <div><strong>Retirada:</strong> ${p.dataRetirada || 'N/A'} às ${p.horaRetirada || 'N/A'}</div>
                            <div class="acoes">
                                ${p.status !== 'Pronto para retirar' ? `<button onclick="atualizarStatus('${id}', 'Pronto para retirar')" class="btn-edit">✅ Marcar como Pronto</button>` : ''}
                                ${p.status !== 'Retirado' ? `<button onclick="atualizarStatus('${id}', 'Retirado')" class="btn-danger">🚪 Marcar como Retirado</button>` : ''}
                                <button onclick="avisoWhatsApp('${id}')" class="btn-whatsapp-modal"><i class="fab fa-whatsapp"></i> Avisar Cliente</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }
        function atualizarStatus(id, novoStatus) {
            db.collection('pedidos').doc(id).update({ status: novoStatus }).then(() => {
                console.log('Status atualizado para: ' + novoStatus);
            }).catch(err => alert('Erro ao atualizar: ' + err));
        }

        function avisoWhatsApp(id) {
            const linkImagem = "https://i.imgur.com/SuaImagemDeParabens.png"; // Troque pelo link da sua imagem!
            const mensagem = `*Gudyx Custom* 🎉\n\nSeu pedido está PRONTO para retirada!\n\n📍 Duque de Caxias - RJ\n\n🛎️ Venha retirar quando preferir!`;
            const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(mensagem + "\n\n" + linkImagem)}`;
            window.open(url, '_blank');
        }

        async function salvarFrases() {
            const lista = document.getElementById('frasesInput').value.split('\n').map(s => s.trim()).filter(s => s);
            await db.collection('config').doc('frases').set({ lista });
            alert('Frases salvas!');
        }

        function carregarFAQ() { document.getElementById('listaFaq').innerHTML = dados.faq.map((faq, i) => `<div class="item"><span><strong>P:</strong> ${faq.pergunta}<br>R: ${faq.resposta}</span><div><button class="btn-edit" onclick="editarFaq(${i})">✏️</button><button onclick="removerFaq(${i})">Remover</button></div></div>`).join('') || '<p>Nenhuma FAQ.</p>'; }
        async function salvarFaq() {
            const id = document.getElementById('editFaqId').value;
            const pergunta = document.getElementById('faqPergunta').value.trim();
            const resposta = document.getElementById('faqResposta').value.trim();
            if (!pergunta || !resposta) return alert('Preencha pergunta e resposta.');
            if (id !== '') { dados.faq[parseInt(id)] = { pergunta, resposta }; }
            else { dados.faq.push({ pergunta, resposta }); }
            await db.collection('config').doc('faq').set({ perguntas: dados.faq });
            document.getElementById('editFaqId').value = ''; document.getElementById('faqPergunta').value = ''; document.getElementById('faqResposta').value = '';
            carregarFAQ();
        }
        function editarFaq(index) { const faq = dados.faq[index]; document.getElementById('editFaqId').value = index; document.getElementById('faqPergunta').value = faq.pergunta; document.getElementById('faqResposta').value = faq.resposta; }
        async function removerFaq(index) { if (confirm('Remover?')) { dados.faq.splice(index, 1); await db.collection('config').doc('faq').set({ perguntas: dados.faq }); carregarFAQ(); } }

        function carregarConfigLoja() {
            document.getElementById('configPrazoMin').value = configLoja.prazoMinimo || 3;
            document.getElementById('configPrazoMax').value = configLoja.prazoMaximo || 5;
            document.getElementById('configPedidosEmAndamento').checked = configLoja.pedidosEmAndamento || false;
        }
        async function salvarConfigLoja() {
            const prazoMin = parseInt(document.getElementById('configPrazoMin').value);
            const prazoMax = parseInt(document.getElementById('configPrazoMax').value);
            const pedidosEmAndamento = document.getElementById('configPedidosEmAndamento').checked;
            if (prazoMin < 1 || prazoMax < prazoMin) return alert('Defina prazos válidos (Mínimo >= 1 e Máximo >= Mínimo).');
            
            await db.collection('config').doc('loja').set({ prazoMinimo: prazoMin, prazoMaximo: prazoMax, pedidosEmAndamento });
            alert('Configurações salvas!');
            carregarConfigLoja();
        }

        function carregarRelatorios() {
            const sorted = [...dados.produtos].sort((a, b) => (b.cliques || 0) - (a.cliques || 0));
            document.getElementById('relatorioContainer').innerHTML = sorted.slice(0, 20).map((p, i) => `<div style="display:flex;justify-content:space-between;padding:5px 0;"><span>${i+1}. ${p.nome}</span><span>${p.cliques || 0} cliques</span></div>`).join('') || '<p>Sem dados.</p>';
        }

        async function exportarBackup() {
            await carregarDados();
            const data = { categorias: dados.categorias, produtos: dados.produtos, frases: dados.frases, faq: dados.faq };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'gudyx_backup.json'; a.click();
        }
        async function importarBackup() {
            const file = document.getElementById('importFile').files[0];
            if (!file) return alert('Selecione um arquivo.');
            const reader = new FileReader();
            reader.onload = async e => {
                const data = JSON.parse(e.target.result);
                if (!data.categorias || !data.produtos) return alert('Arquivo inválido.');
                if (!confirm('Substituir TODOS os dados?')) return;
                for (const d of (await db.collection('categorias').get()).docs) { await d.ref.delete(); }
                for (const d of (await db.collection('produtos').get()).docs) { await d.ref.delete(); }
                for (const cat of data.categorias) { const { id, ...rest } = cat; const ref = await db.collection('categorias').add(rest); await ref.update({ id: ref.id }); }
                for (const prod of data.produtos) { const { id, ...rest } = prod; const ref = await db.collection('produtos').add(rest); await ref.update({ id: ref.id }); }
                await db.collection('config').doc('frases').set({ lista: data.frases || [] });
                await db.collection('config').doc('faq').set({ perguntas: data.faq || [] });
                await carregarDados(); atualizarListaCategorias(); atualizarSelectCategorias(); atualizarListaProdutos();
                document.getElementById('frasesInput').value = dados.frases.join('\n'); carregarFAQ(); carregarRelatorios();
                alert('Backup restaurado!');
            };
            reader.readAsText(file);
        }

        async function limparDados() {
            if (!confirm('Apagar TUDO?')) return;
            for (const d of (await db.collection('categorias').get()).docs) { await d.ref.delete(); }
            for (const d of (await db.collection('produtos').get()).docs) { await d.ref.delete(); }
            await db.collection('config').doc('frases').set({ lista: ['Oi, eu sou Gluudyx! ✦'] });
            await db.collection('config').doc('faq').set({ perguntas: [] });
            await carregarDados(); atualizarListaCategorias(); atualizarSelectCategorias(); atualizarListaProdutos();
            document.getElementById('frasesInput').value = dados.frases.join('\n'); carregarFAQ(); carregarRelatorios();
        }

        function checkPassword() {
            if (btoa(document.getElementById('adminPassInput').value) === btoa('gudyx2026')) {
                document.getElementById('passwordOverlay').classList.add('hidden');
                document.getElementById('adminContent').style.display = 'block';
                carregarDados().then(() => {
                    atualizarListaCategorias(); atualizarSelectCategorias(); atualizarListaProdutos();
                    document.getElementById('frasesInput').value = dados.frases.join('\n'); carregarFAQ(); carregarRelatorios();
                });
            } else { document.getElementById('passError').style.display = 'block'; }
        }
        document.getElementById('adminPassInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
    </script>
</body>
