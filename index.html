<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudyx Custom - Catálogo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        :root {
            --roxo-profundo: #0b041c;
            --roxo-meio: #1a0a33;
            --ciano-brilhante: #00f2fe;
            --rosa-neon: #ff66b2;
            --amarelo-neon: #ffe500;
            --branco-espacial: #f0eaff;
            --vidro-fundo: rgba(11, 4, 28, 0.65);
            --vidro-borda: rgba(172, 40, 255, 0.3);
            --sombra-neon: 0 0 25px rgba(172, 40, 255, 0.4);
            --sombra-hover: 0 20px 60px rgba(0, 0, 0, 0.8);
            --transicao: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --bg-body: #0b041c;
            --cor-texto: #f0eaff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            background: var(--bg-body);
            color: var(--cor-texto);
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px;
        }
        .bg-container { position: fixed; top: -20px; left: -20px; width: calc(100% + 40px); height: calc(100% + 40px); z-index: -3; background-image: url('https://i.imgur.com/UDwnKUg.png'); background-size: cover; background-position: center; filter: blur(5px); transform: scale(1.02); }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 50% 50%, rgba(26, 10, 51, 0.4) 0%, rgba(11, 4, 28, 0.9) 100%); }
        #meteorCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; display: block; }
        .screen { display: none; min-height: 100vh; width: 100%; position: relative; animation: fadeSlideIn 0.6s ease forwards; }
        .screen.active { display: flex; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floatMascote { 0%,100% { transform:translateY(0) rotate(-2deg); } 50% { transform:translateY(-25px) rotate(2deg); } }
        @keyframes pulseGlow { 0%,100% { box-shadow:0 0 20px rgba(172,40,255,0.4); } 50% { box-shadow:0 0 40px rgba(172,40,255,0.8); } }
        @keyframes rotateGlow { 100% { transform:rotate(360deg); } }
        @keyframes fireGlow { 0% { box-shadow:0 0 15px rgba(172,40,255,0.6); transform:scale(1); } 100% { box-shadow:0 0 30px rgba(172,40,255,1); transform:scale(1.05); } }
        @keyframes eletricidade { 0% { box-shadow:0 0 5px #a028ff; border-color:#a028ff; } 20% { box-shadow:0 0 20px #00f2fe; border-color:#00f2fe; } 40% { box-shadow:0 0 5px #a028ff; border-color:#a028ff; } 60% { box-shadow:0 0 30px #d400ff; border-color:#d400ff; } 80% { box-shadow:0 0 5px #a028ff; border-color:#a028ff; } 100% { box-shadow:0 0 15px #00f2fe; border-color:#00f2fe; } }
        @keyframes pulseStock { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        @keyframes bounceCart { 0%,100% { transform: scale(1); } 30% { transform: scale(1.3); } 50% { transform: scale(0.9); } 70% { transform: scale(1.1); } }
        @keyframes wiggle { 0% { transform: rotate(0); } 25% { transform: rotate(-1deg); } 75% { transform: rotate(1deg); } 100% { transform: rotate(0); } }
        @keyframes discoBg { 0% { background-color: #ff00ff; } 20% { background-color: #ffff00; } 40% { background-color: #00ffff; } 60% { background-color: #ff0000; } 80% { background-color: #00ff00; } 100% { background-color: #0000ff; } }
        @keyframes flameFlicker { 0% { opacity: 1; transform: translateY(0); } 50% { opacity: 0.7; transform: translateY(-3px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes rainbowBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes purpleFire { 0% { background-position: 0% 0%; box-shadow: 0 0 20px #a028ff, 0 0 40px #d400ff; } 50% { background-position: 0% 100%; box-shadow: 0 0 30px #d400ff, 0 0 60px #a028ff; } 100% { background-position: 0% 0%; box-shadow: 0 0 20px #a028ff, 0 0 40px #d400ff; } }
        body.festa { animation: discoBg 0.2s infinite; }
        .float-cart.bounce { animation: bounceCart 0.6s ease; }
        .produto-card:hover { animation: wiggle 0.5s ease; }
        .flame-icon { display: inline-block; margin-left: 4px; animation: flameFlicker 0.8s infinite; font-size: 1.2em; }
        .btn-wa-card, .btn-whatsapp-modal, .btn-wa-cart {
            background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff0088) !important;
            background-size: 400% 400% !important;
            animation: rainbowBg 3s ease infinite;
            color: #fff !important;
            border: none;
        }
        .btn-wa-card:hover, .btn-whatsapp-modal:hover, .btn-wa-cart:hover { animation: rainbowBg 1s linear infinite; }
        .logo-wrapper { position:relative; display:inline-block; }
        .logo-img { max-height:250px; filter:drop-shadow(0 0 30px rgba(172,40,255,0.8)); }
        .fala-container { position:absolute; top:15px; right:-60px; width:200px; background:rgba(11,4,28,0.85); backdrop-filter:blur(8px); border:1px solid rgba(172,40,255,0.6); border-radius:16px; padding:10px 14px; font-size:0.85rem; box-shadow:0 0 30px rgba(172,40,255,0.4); pointer-events:none; opacity:0; transition:opacity 0.4s, transform 0.4s; transform:translateX(10px); z-index:9999; text-align:center; }
        .fala-container::before { content:''; position:absolute; left:-12px; top:16px; border:6px solid transparent; border-right-color:rgba(11,4,28,0.85); }
        .fala-container.falando { opacity:1; transform:translateX(0); }
        .home-screen { flex-direction:column; padding:20px; gap:20px; width:100%; max-width:1400px; margin:0 auto; }
        .header-top { text-align:center; padding:10px 0 5px; display:flex; flex-direction:column; align-items:center; }
        .header-top .subtitle { font-size:clamp(1.2rem,3vw,1.8rem); font-weight:500; letter-spacing:4px; text-shadow:0 0 15px rgba(172,40,255,0.8); }
        .header-top .slogan { font-size:clamp(1rem,2vw,1.3rem); font-weight:300; font-style:italic; letter-spacing:2px; }
        .main-area { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:10px 0; }
        .mascote-block { display:flex; flex-direction:column; align-items:center; gap:15px; flex:0 0 420px; margin-left:30px; }
        .mascote-wrapper { position:relative; animation:floatMascote 6s ease-in-out infinite; cursor:pointer; }
        .mascote-wrapper:hover { transform:scale(1.05); }
        .mascote-wrapper img { width:clamp(220px,35vw,380px); height:auto; filter:drop-shadow(0 20px 40px rgba(0,0,0,0.7)); border-radius:50%; }
        .mascote-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:250px; height:250px; border-radius:50%; background:radial-gradient(circle, rgba(172,40,255,0.4) 0%, transparent 70%); z-index:-1; animation:pulseGlow 3s ease-in-out infinite; pointer-events:none; }
        .mascote-wrapper.feliz img { filter:drop-shadow(0 0 40px rgba(0,242,254,0.6)); }
        .mascote-wrapper.triste img { filter:drop-shadow(0 0 30px rgba(100,100,255,0.4)) brightness(0.8); }
        .mascote-wrapper.surpreso img { transform:scale(1.1); filter:drop-shadow(0 0 50px rgba(255,229,0,0.7)); }
        .mascote-wrapper.irritado-1 img { transform:rotate(-5deg) scale(0.95); filter:drop-shadow(0 0 30px rgba(255,68,68,0.6)); }
        .mascote-wrapper.irritado-2 img { transform:rotate(10deg) scale(0.9); filter:drop-shadow(0 0 50px rgba(255,0,0,0.8)); }
        .mascote-wrapper.fugindo { animation:fugaMascote 0.8s ease forwards !important; }
        @keyframes fugaMascote { 0% { transform:translateY(0) scale(1); opacity:1; } 100% { transform:translateY(200vh) scale(0.5) rotate(40deg); opacity:0; } }
        .mascote-wrapper.voltando { animation:voltaMascote 0.6s ease forwards !important; }
        @keyframes voltaMascote { 0% { transform:translateY(200vh) scale(0.5) rotate(40deg); opacity:0; } 100% { transform:translateY(0) scale(1) rotate(0); opacity:1; } }
        .mascote-wrapper.somiu { display:none !important; }
        #alertaContainer { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:99999; display:none; justify-content:center; align-items:center; background:rgba(0,0,0,0.2); }
        #alertaContainer.active { display:flex; }
        .alerta-sinal { font-size:clamp(12rem,50vw,30rem); color:#ff4455; text-shadow:0 0 60px #ff4455; animation:alertaPulse 0.5s ease-in-out infinite alternate; opacity:0.8; }
        @keyframes alertaPulse { 0% { transform:scale(1); } 100% { transform:scale(1.1); } }
        .btn-acessar { padding:22px 60px; font-size:1.4rem; font-weight:700; letter-spacing:4px; text-transform:uppercase; background:linear-gradient(135deg,#a028ff 0%,var(--ciano-brilhante) 100%); border:none; border-radius:60px; cursor:pointer; box-shadow:0 8px 30px rgba(0,0,0,0.5); transition:0.3s; color:#fff; }
        .btn-acessar:hover { transform:translateY(-3px); box-shadow:0 0 50px rgba(172,40,255,0.8); }
        .promo-slider-container { flex:0 1 520px; max-width:580px; min-width:300px; margin-left:auto; margin-right:30px; padding-left:20px; }
        .slider-box { background:var(--vidro-fundo); backdrop-filter:blur(12px); border:2px solid #a028ff; border-radius:24px; overflow:hidden; animation:eletricidade 1.5s ease-in-out infinite; position:relative; }
        .fire-badge { position:absolute; top:12px; right:12px; background:rgba(122,0,255,0.4); padding:4px 14px; border-radius:20px; font-weight:800; font-size:0.8rem; text-transform:uppercase; z-index:2; animation:fireGlow 0.8s ease-in-out infinite alternate; border:1px solid rgba(255,255,255,0.2); }
        #dynamicSliderContainer .slide-item { display:none; padding:25px 20px; text-align:center; cursor:pointer; }
        #dynamicSliderContainer .slide-item.active-slide { display:block; }
        #dynamicSliderContainer .slide-item img { width:100%; max-height:280px; object-fit:contain; border-radius:12px; background:rgba(0,0,0,0.3); }
        #dynamicSliderContainer .slide-item h4 { font-size:1.2rem; margin:5px 0; }
        #dynamicSliderContainer .slide-item .preco { font-size:1.6rem; font-weight:700; color:var(--amarelo-neon); }
        #sliderDots { display:flex; gap:8px; justify-content:center; padding:0 0 15px; }
        #sliderDots .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.2); cursor:pointer; border:none; }
        #sliderDots .dot.active-dot { background:var(--ciano-brilhante); transform:scale(1.3); }
        .mais-vendidos-section { width:100%; padding-top:15px; border-top:1px solid var(--vidro-borda); }
        .mais-vendidos-section .section-title { font-size:1.3rem; letter-spacing:4px; text-align:center; font-weight:300; }
        .grid-vendidos { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:20px; }
        .card-vendido {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius:20px;
            padding:20px 14px;
            text-align:center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor:pointer;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: visible !important;
        }
        .card-vendido::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
            pointer-events: none;
        }
        .card-vendido:hover::before { left: 100%; }
        .card-vendido:hover {
            background: rgba(172, 40, 255, 0.15);
            border-color: rgba(172, 40, 255, 0.6);
            box-shadow: 0 15px 50px rgba(172, 40, 255, 0.4), 0 0 30px rgba(0, 242, 254, 0.2);
            transform: translateY(-10px) scale(1.03);
        }
        .card-vendido h4 { font-size:0.95rem; font-weight:500; }
        .card-vendido .preco { font-weight:700; color:var(--amarelo-neon); font-size:1.1rem; }
        .fire-badge-mini {
            position: absolute;
            top: -18px; left: -18px;
            background: linear-gradient(180deg, #a028ff, #d400ff, #a028ff) !important;
            background-size: 100% 300% !important;
            padding: 5px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            animation: purpleFire 1.2s ease-in-out infinite !important;
            box-shadow: 0 0 25px #a028ff, 0 0 50px #d400ff, 0 0 75px #a028ff !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: #fff !important;
            text-shadow: 0 0 10px #fff, 0 0 20px #d400ff !important;
            z-index: 20 !important;
            letter-spacing: 1px;
            line-height: 1;
        }
        .listagem-screen { flex-direction:column; align-items:center; padding:30px 20px; gap:20px; background:rgba(11,4,28,0.6); width:100%; }
        .listagem-header { display:flex; align-items:center; gap:15px; flex-wrap:wrap; justify-content:center; width:100%; max-width:1100px; }
        .listagem-header h2 { font-size:clamp(1.5rem,3vw,2.2rem); letter-spacing:4px; }
        .search-box { display:flex; gap:10px; max-width:400px; background:var(--vidro-fundo); border:1px solid var(--vidro-borda); border-radius:30px; padding:5px 15px; }
        .search-box input { width:100%; background:transparent; border:none; color:var(--cor-texto); padding:10px; outline:none; }
        .btn-voltar { padding:10px 28px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:30px; cursor:pointer; color:var(--cor-texto); }
        .grid-categorias { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; width:100%; max-width:1100px; }
        .categoria-card { background:var(--vidro-fundo); backdrop-filter:blur(12px); border:1px solid var(--vidro-borda); border-radius:20px; padding:25px 20px; text-align:center; transition:0.3s; cursor:pointer; }
        .categoria-card:hover { transform:translateY(-6px); border-color:var(--ciano-brilhante); }
        .categoria-card img { width:80px; height:80px; border-radius:50%; object-fit:cover; }
        .produtos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; width:100%; max-width:1100px; }
        .produto-card { background:var(--vidro-fundo); backdrop-filter:blur(8px); border:1px solid var(--vidro-borda); border-radius:16px; padding:15px; text-align:center; cursor:pointer; transition:0.3s; position:relative; }
        .produto-card:hover { transform:translateY(-4px); box-shadow:0 8px 30px rgba(172,40,255,0.3); }
        .produto-card img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
        .produto-card h5 { font-size:0.95rem; }
        .produto-card .preco { font-weight:700; color:var(--amarelo-neon); }
        .btn-add-cart { padding:8px 16px; background:linear-gradient(135deg,#a028ff,#00f2fe); color:#fff; border-radius:20px; border:none; cursor:pointer; font-size:0.85rem; }
        .btn-add-cart:hover { transform:scale(1.05); }
        .btn-add-cart:disabled { background:#555; cursor:not-allowed; }
        .btn-wa-card { margin-top:8px; padding:8px 16px; background:#25D366; color:#fff; border-radius:20px; text-decoration:none; font-size:0.85rem; display:inline-block; }
        .btn-wa-card:hover { transform:scale(1.05); }
        #productModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:99999; display:none; justify-content:center; align-items:center; padding:20px; }
        #productModal.active { display:flex; }
        .modal-box { background:var(--vidro-fundo); backdrop-filter:blur(12px); border:1px solid var(--vidro-borda); border-radius:24px; max-width:600px; width:100%; padding:30px; position:relative; max-height:90vh; overflow-y:auto; }
        .modal-box .close-modal { position:absolute; top:10px; right:20px; font-size:2rem; cursor:pointer; background:none; border:none; color:#fff; }
        .modal-gallery { display:flex; gap:10px; overflow-x:auto; padding:5px 0 15px; }
        .modal-gallery img { height:250px; border-radius:12px; }
        .modal-box h2 { font-size:1.8rem; margin-bottom:5px; }
        .modal-box .modal-price { font-size:1.6rem; font-weight:700; color:var(--amarelo-neon); }
        .modal-box .modal-price-old { color:var(--rosa-neon); text-decoration:line-through; font-size:1.2rem; }
        .quantidade-container { display:flex; align-items:center; gap:15px; margin:15px 0; }
        .qtd-control button { width:32px; height:32px; border-radius:50%; border:1px solid var(--vidro-borda); background:rgba(255,255,255,0.1); color:#fff; font-size:1.2rem; cursor:pointer; }
        #cartDrawerOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:99999; display:none; }
        #cartDrawerOverlay.active { display:block; }
        #cartDrawer { position:fixed; top:0; right:-400px; width:400px; height:100vh; background:var(--vidro-fundo); backdrop-filter:blur(16px); border-left:1px solid var(--vidro-borda); z-index:100000; transition:right 0.4s; display:flex; flex-direction:column; }
        #cartDrawer.open { right:0; }
        .cart-drawer-header { display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid var(--vidro-borda); }
        .cart-drawer-body { flex:1; overflow-y:auto; padding:20px; }
        .cart-drawer-item { display:flex; gap:10px; margin-bottom:15px; align-items:center; }
        .cart-drawer-item img { width:50px; height:50px; border-radius:8px; object-fit:cover; }
        .cart-drawer-footer { padding:20px; border-top:1px solid var(--vidro-borda); }
        .cart-total { font-size:1.3rem; font-weight:700; color:var(--amarelo-neon); text-align:right; }
        .float-cart { position:fixed; bottom:30px; right:20px; width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#a028ff,#00f2fe); color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.8rem; cursor:pointer; z-index:9998; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
        .cart-badge { position:absolute; top:-5px; right:-5px; background:#ff4455; border-radius:50%; width:24px; height:24px; font-size:0.8rem; display:flex; align-items:center; justify-content:center; font-weight:700; }
        .footer { position:fixed; bottom:0; left:0; width:100%; background:rgba(11,4,28,0.9); padding:10px; text-align:center; font-size:0.8rem; z-index:10; }
        #miniGluudyx {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100002 !important;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        #miniGluudyx img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--ciano-brilhante);
            box-shadow: 0 0 30px rgba(172,40,255,0.9);
            animation: floatMascote 3s ease-in-out infinite;
        }
        .mini-fala {
            background: rgba(11,4,28,0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--vidro-borda);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            max-width: 200px;
            box-shadow: 0 0 20px rgba(172,40,255,0.5);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    <canvas id="meteorCanvas"></canvas>

    <!-- MODAL DO PRODUTO -->
    <div id="productModal">
        <div class="modal-box">
            <button class="close-modal" onclick="fecharModal()">×</button>
            <div id="modalGallery" class="modal-gallery"></div>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <div id="modalPriceContainer"></div>
            <div class="quantidade-container">
                <label>Quantidade:</label>
                <div class="qtd-control">
                    <button onclick="alterarQuantidade(-1)">−</button>
                    <span id="qtdModal">1</span>
                    <button onclick="alterarQuantidade(1)">+</button>
                </div>
            </div>
            <button id="modalAddCartBtn" class="btn-add-cart" onclick="addToCartFromModal()"><i class="fas fa-cart-plus"></i> Adicionar</button>
            <button class="btn-whatsapp-modal btn-wa-card" onclick="comprarWhatsAppModal()"><i class="fab fa-whatsapp"></i> Comprar agora</button>
            <div id="modalStockStatus" style="margin-top:5px;"></div>
            <div class="avaliacoes-container" id="avaliacoesContainer">
                <h4>⭐ Avaliações</h4>
                <div id="avaliacoesList"></div>
                <div class="form-avaliacao">
                    <select id="avaliacaoNota">
                        <option value="5">5 estrelas</option>
                        <option value="4">4 estrelas</option>
                        <option value="3">3 estrelas</option>
                        <option value="2">2 estrelas</option>
                        <option value="1">1 estrela</option>
                    </select>
                    <textarea id="avaliacaoComentario" placeholder="Deixe seu comentário..."></textarea>
                    <button onclick="salvarAvaliacao()">Enviar avaliação</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CARRINHO DRAWER -->
    <div id="cartDrawerOverlay" onclick="fecharDrawer()"></div>

        function getMensagensMascote() {
            const msgs = [];

                msgs.push(...dados.frases);
                msgs.push(...dados.frases);
                msgs.push(...dados.frases);

        function atualizarMensagensMascote() {
            mascoteMensagens = getMensagensMascote();

        function falarMascote(msgP = null) {
            if (estaFugindo || estaVoltando || estaSumido || estaContando) return;
            if (timeoutFala) { clearTimeout(timeoutFala); timeoutFala = null; }

            const falaContainer = document.getElementById('falaContainer');
            if (!falaContainer) return;
            const msg = msgP || mascoteMensagens[mascoteMsgIdx % mascoteMensagens.length];
            mascoteMsgIdx++;
            falaContainer.textContent = msg;
            falaContainer.classList.add('falando');
            estaFalando = true;
            timeoutFala = setTimeout(() => { falaContainer.classList.remove('falando'); estaFalando = false; timeoutFala = null; }, 4000);

            const wrapper = document.getElementById('mascoteWrapper');
            wrapper?.classList.remove('feliz', 'triste', 'surpreso', 'irritado-1', 'irritado-2', 'fugindo', 'voltando');
            if (expressao) wrapper?.classList.add(expressao);
        }

        document.getElementById('mascoteWrapper')?.addEventListener('click', function() {
            if (estaSumido || estaFugindo || estaVoltando || estaContando) return;
            if (timeoutFala) { clearTimeout(timeoutFala); timeoutFala = null; estaFalando = false; }
            document.getElementById('falaContainer')?.classList.remove('falando');
            const agora = Date.now();
            const emRecarga = (ultimaIrritacaoTimestamp > 0) && (agora - ultimaIrritacaoTimestamp < RESET_INTERVAL);
            if (!emRecarga) { if (agora - ultimoCliqueTime > 2000) cliqueCount = 0; cliqueCount++; ultimoCliqueTime = agora; }
            else { cliqueCount = 0; }
            const eff = emRecarga ? 1 : cliqueCount;
            if (eff === 1) {
                mostrarExpressao('feliz');
                if (dados.frases && dados.frases.length > 0 && Math.random() < 0.5) {
                    falarMascote(dados.frases[Math.floor(Math.random() * dados.frases.length)]);
                } else {
                    const rand = Math.random();
                    if (rand < 0.3) falarMascote('Opa! Clicou em mim? Que honra! 😊');
                    else if (rand < 0.6) falarMascote('Você é fofo(a) de ficar me clicando! 🥰');
                    else falarMascote(piadas[Math.floor(Math.random() * piadas.length)]);
                }
            } else if (eff === 2) {
                mostrarExpressao('irritado-1');
                falarMascote('Para com isso! 😤');
            } else if (eff === 3) {
                mostrarExpressao('irritado-2');
                falarMascote('Gluudyx está bravo com você! 😡');
            } else if (eff >= 4) {
                mostrarExpressao(null); estaContando = true;
                const mensagens = ['JÁ CHEGA! VOU EMBORA! 🚀 5...', 'Tchau em 4...', 'Tchau em 3...', 'Tchau em 2...', 'Tchau em 1...'];

                    if (index < mensagens.length) { document.getElementById('falaContainer').textContent = mensagens[index]; index++; }

                        clearInterval(iv); estaContando = false; estaFugindo = true;

                        document.getElementById('alertaContainer')?.classList.add('active');
                        setTimeout(() => {
                            document.getElementById('mascoteWrapper').classList.add('somiu');

                            document.getElementById('peekingHead')?.classList.add('active');
                            ultimaIrritacaoTimestamp = Date.now(); salvarEstadoMascote();
                            document.getElementById('alertaContainer')?.classList.remove('active');

            if (!emRecarga) { setTimeout(() => { cliqueCount = 0; mostrarExpressao('feliz'); salvarEstadoMascote(); }, 5000); salvarEstadoMascote(); }

            const sc = sessionStorage.getItem('gudyxCarrinho');

            sessionStorage.setItem('gudyxCarrinho', JSON.stringify({ items: carrinho, cupom: cupomAtual, timestamp: Date.now() }));

        function renderizarDrawer() {
            const body = document.getElementById('cartDrawerBody'), totalEl = document.getElementById('cartDrawerTotal');
            if (carrinho.length === 0) { body.innerHTML = '<div class="cart-empty">Seu carrinho está vazio.</div>'; totalEl.textContent = 'R$ 0,00'; return; }
            let html = '', total = 0;
            carrinho.forEach(item => {
                const sub = parseFloat(item.preco.replace(',', '.')) * item.quantidade; total += sub;
                html += `<div class="cart-drawer-item"><img src="${item.imagem || 'https://placehold.co/50'}" class="item-img"><div><h4>${item.nome}</h4><div>R$ ${item.preco} x ${item.quantidade}</div></div><button onclick="removerDoCarrinho('${item.id}')">🗑️</button></div>`;

            body.innerHTML = html;
            if (cupomAtual) { if (cupomAtual.tipo === 'percentual') total *= (1 - cupomAtual.valor / 100); else total = Math.max(0, total - cupomAtual.valor); }
            totalEl.textContent = `R$ ${total.toFixed(2)}`;
        }
        function addToCart(prodId, qtd = 1) {
            const prod = dados.produtos.find(p => p.id === prodId);
            if (!prod || !isEmEstoque(prod)) return alert('Esgotado!');
            const exist = carrinho.find(c => c.id === prodId);
            const preco = isPromoActive(prod) ? prod.precoPromo : prod.preco;
            if (exist) { if (exist.quantidade + qtd > getEstoque(prod)) return alert('Estoque máximo!'); exist.quantidade += qtd; }

        function enviarOrcamentoWhatsApp() {
            if (carrinho.length === 0) return alert('Carrinho vazio!');
            let msg = '*Gudyx Custom - Orçamento*\n\n', total = 0;
            carrinho.forEach(item => { const sub = parseFloat(item.preco.replace(',', '.')) * item.quantidade; total += sub; msg += `🛒 *${item.nome}* - ${item.quantidade}x - R$ ${item.preco}\n`; });
            if (cupomAtual) { if (cupomAtual.tipo === 'percentual') total *= (1 - cupomAtual.valor / 100); else total = Math.max(0, total - cupomAtual.valor); msg += `💳 *Cupom ${cupomAtual.codigo}*\n`; }

            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');

            if (!produtoModalAtual || !isEmEstoque(produtoModalAtual)) return;
            const q = parseInt(document.getElementById('qtdModal').textContent), p = isPromoActive(produtoModalAtual) ? produtoModalAtual.precoPromo : produtoModalAtual.preco;
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(`*Gudyx*\n🛒 ${produtoModalAtual.nome}\n💰 ${p} x ${q}\nQuero comprar!`)}`, '_blank');
            fecharModal();
        }

        // Avaliações
        function carregarAvaliacoes() { const a = localStorage.getItem('gudyx_avaliacoes'); avaliacoes = a ? JSON.parse(a) : {}; }
        function salvarAvaliacoes() { localStorage.setItem('gudyx_avaliacoes', JSON.stringify(avaliacoes)); }
        function salvarAvaliacao() {
            if (!produtoModalAtual) return;
            const nota = parseInt(document.getElementById('avaliacaoNota').value);
            const comentario = document.getElementById('avaliacaoComentario').value.trim();
            if (!comentario) return alert('Escreva um comentário.');
            const id = produtoModalAtual.id;
            if (!avaliacoes[id]) avaliacoes[id] = [];
            avaliacoes[id].push({ nota, comentario, autor: 'Cliente', data: new Date().toISOString() });
            salvarAvaliacoes();
            document.getElementById('avaliacaoComentario').value = '';
            document.getElementById('avaliacoesList').innerHTML = (avaliacoes[id] || []).map(av => `<div class="avaliacao-item"><div class="estrelas">${'★'.repeat(av.nota)+'☆'.repeat(5-av.nota)}</div><div class="comentario">${av.comentario}</div></div>`).join('');
        }

        // Slider
        let slideAtual = 0, sliderIntervalo;
        function iniciarSlider() {
            const c = document.getElementById('dynamicSliderContainer'), d = document.getElementById('sliderDots'); c.innerHTML = ''; d.innerHTML = '';
            const itens = dados.produtos.filter(p => p.exibirSlider && isEmEstoque(p));
            if (itens.length === 0) { c.innerHTML = '<div style="padding:30px;text-align:center;">Sem promoções no momento.</div>'; return; }
            itens.forEach((p, i) => {
                const s = document.createElement('div'); s.className = 'slide-item' + (i === 0 ? ' active-slide' : ''); s.onclick = () => abrirModal(p.id);
                s.innerHTML = `<img src="${getImagemPrincipal(p)}"><h4>${p.nome}</h4><div class="preco">R$ ${p.precoPromo || p.preco}</div>`;
                c.appendChild(s);
                const dot = document.createElement('button'); dot.className = 'dot' + (i === 0 ? ' active-dot' : ''); dot.onclick = () => { clearInterval(sliderIntervalo); mudarSlide(i); iniciarSliderLoop(); }; d.appendChild(dot);
            });
            slideAtual = 0; iniciarSliderLoop();
        }
        function mudarSlide(i) { document.querySelectorAll('#dynamicSliderContainer .slide-item').forEach((s, idx) => s.classList.toggle('active-slide', idx === i)); document.querySelectorAll('#sliderDots .dot').forEach((d, idx) => d.classList.toggle('active-dot', idx === i)); slideAtual = i; }
        function iniciarSliderLoop() { clearInterval(sliderIntervalo); sliderIntervalo = setInterval(() => { const slides = document.querySelectorAll('#dynamicSliderContainer .slide-item'); if (slides.length > 0) mudarSlide((slideAtual + 1) % slides.length); }, 4000); }
        function resetarSlider() { clearInterval(sliderIntervalo); iniciarSlider(); }

        // Mais vendidos
        function carregarMaisVendidos() {
            const grid = document.getElementById('maisVendidosGrid'); grid.innerHTML = '';
            const top = [...dados.produtos].sort((a, b) => (b.cliques || 0) - (a.cliques || 0)).slice(0, 5);
            top.forEach((p, i) => {
                const card = document.createElement('div'); card.className = 'card-vendido'; card.onclick = () => abrirModal(p.id);
                card.innerHTML = `${i < 3 ? '<div class="fire-badge-mini">HOT</div>' : ''}<img src="${getImagemPrincipal(p)}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;"><h4>${p.nome}</h4><div class="preco">R$ ${p.preco}</div>`;
                grid.appendChild(card);
            });
        }

        // Categorias e produtos
        let categoriaSelecionada = null;
        function carregarCategorias(tipo) {
            const container = document.getElementById(tipo === 'produtos' ? 'produtosCategoriasContainer' : 'servicosCategoriasContainer'); container.innerHTML = '';
            dados.categorias.filter(c => c.tipo === tipo).forEach(cat => {
                const card = document.createElement('div'); card.className = 'categoria-card';
                card.innerHTML = `${cat.imagem ? `<img src="${cat.imagem}" class="categoria-img">` : '<i class="fas fa-folder" style="font-size:3rem;"></i>'}<h4>${cat.nome}</h4>`;
                card.onclick = () => selecionarCategoria(tipo, cat.id); container.appendChild(card);
            });
        }
        function selecionarCategoria(tipo, catId) {
            categoriaSelecionada = { tipo, id: catId };
            const container = document.getElementById(tipo === 'produtos' ? 'produtosProdutosContainer' : 'servicosProdutosContainer');
            container.innerHTML = '';
            dados.produtos.filter(p => p.categoriaId === catId).forEach(prod => {
                const card = document.createElement('div'); card.className = 'produto-card'; card.onclick = () => abrirModal(prod.id);
                card.innerHTML = `<img src="${getImagemPrincipal(prod)}"><h5>${prod.nome}</h5><div class="preco">R$ ${prod.preco}</div><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart('${prod.id}')">🛒</button><a href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent('Quero comprar: ' + prod.nome)}" target="_blank" class="btn-wa-card">💬</a>`;
                container.appendChild(card);
            });
            container.style.display = 'grid';
        }

        function buscarItems(tipo) {
            const term = document.getElementById(tipo === 'produtos' ? 'searchProdutos' : 'searchServicos').value.toLowerCase();
            const container = document.getElementById(tipo === 'produtos' ? 'produtosProdutosContainer' : 'servicosProdutosContainer');
            if (term === 'gudyx') { container.innerHTML = '<div class="produto-card"><h5>🥚 Ovo Cósmico</h5><p>Easter egg!</p></div>'; return; }
            if (!categoriaSelecionada) return;
            container.innerHTML = dados.produtos.filter(p => p.categoriaId === categoriaSelecionada.id && p.nome.toLowerCase().includes(term)).map(p => `<div class="produto-card" onclick="abrirModal('${p.id}')"><img src="${getImagemPrincipal(p)}"><h5>${p.nome}</h5></div>`).join('');
        }

        // Meteoros
        (function() {
            const c = document.getElementById('meteorCanvas'), ctx = c.getContext('2d');
            let w, h, meteors = [];
            function resize() { w = c.width = innerWidth; h = c.height = innerHeight; }
            window.addEventListener('resize', resize); resize();
            for (let i = 0; i < 30; i++) meteors.push({ x: Math.random()*w, y: Math.random()*h, size: Math.random()*3+1, speed: Math.random()*5+2 });
            function draw() {
                ctx.clearRect(0, 0, w, h);
                meteors.forEach(m => {
                    m.x += m.speed; m.y += m.speed * 0.5;
                    if (m.x > w + 50 || m.y > h + 50) { m.x = Math.random()*w; m.y = -50; }
                    ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x - m.speed*10, m.y - m.speed*5);
                    ctx.strokeStyle = `rgba(172,40,255,0.5)`; ctx.lineWidth = m.size; ctx.stroke();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // Visitas
        function contarVisita() { let v = parseInt(localStorage.getItem('visitas') || '0'); if (!sessionStorage.getItem('visitou')) { v++; localStorage.setItem('visitas', v); sessionStorage.setItem('visitou', '1'); } document.getElementById('visitCounter').textContent = v; }

        // Init
        carregarDadosFirebase().then(() => {
            contarVisita(); resetarSlider(); carregarMaisVendidos();
            iniciarListenerFirebase();
            setTimeout(() => { atualizarMensagensMascote(); falarMascote(); }, 3000);
        });

        setInterval(() => { if (!estaFalando) { atualizarMensagensMascote(); falarMascote(); } }, 15000);
    </script>
</body>
</html>
